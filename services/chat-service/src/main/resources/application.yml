server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_chat?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

llm:
  base-url: http://localhost:8080
  # 云端模型通常也是 OpenAI 兼容接口，例如 https://api.openai.com/v1/chat/completions
  chat-path: /v1/chat/completions
  # 建议通过环境变量注入：LLM_API_KEY=xxx
  api-key: ${LLM_API_KEY:}
  model: qwen3.5
  temperature: 0.2

rag:
  base-url: http://localhost:8082

chat:
  history-max-messages: 3
  rag-top-k: 2
  rag-chunk-max-chars: 500
